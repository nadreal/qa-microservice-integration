name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qa_microservice
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d qa_microservice"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:      
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/qa_microservice      
      BASE_URL: http://127.0.0.1:8000


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt          
      
      - name: Init DB schema
        run: |
          python -m app.db.init_db

      - name: Start API (uvicorn)
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid
          echo "Uvicorn started with PID $(cat uvicorn.pid)"

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/api/v1/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 1
          done
          echo "API failed to become healthy"
          echo "---- uvicorn.log ----"
          tail -n 200 uvicorn.log || true
          exit 1

      - name: Run tests        
        run: |
          pytest -v -s \
            --maxfail=2 \
            --disable-warnings \
            --cov=app \
            --cov-report=term \
            --cov-report=html:htmlcov \
            --cov-report=xml \
            --alluredir=allure-results

      - name: Stop API
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then kill $(cat uvicorn.pid) || true; fi

      - name: Debug coverage before deploy
        run: |
          echo "=== HTMLCOV ==="
          ls -R htmlcov || true

          echo "=== PUBLIC BEFORE COPY ==="
          ls -R public || true 

      - name: Generate Allure / covarage report (using tobix/allure-cli)
        if: always()
        run: |
          rm -rf public            
          mkdir -p public/allure 
          mkdir -p public/coverage

          if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
           docker run --rm \
          -v "${{ github.workspace }}/allure-results:/results" \
          -v "${{ github.workspace }}/allure-report:/report" \
          tobix/allure-cli:latest generate /results -o /report --clean
          else
            echo "<h1>No Allure results found</h1>" > allure-report/index.html
          fi         

          if [ -d "htmlcov" ] && [ "$(ls -A htmlcov 2>/dev/null)" ]; then            
            cp -r htmlcov/. public/coverage/

          else
            echo "<h1>No coverage generated</h1>" > public/coverage/index.html
          fi
          echo "=== PUBLIC ==="
          ls -R public
          cp -r allure-report/. public/allure || true
   

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public          
          publish_branch: gh-pages
          force_orphan: true
      
      # Keep logs if something fails
      - name: Upload uvicorn log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log
          path: uvicorn.log
          